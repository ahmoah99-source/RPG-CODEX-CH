name: Build APK Clean Expo Final
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # إجبار كل عمليات الـ Node على استخدام نسخة 20
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean Install dependencies
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      - name: Force Install Reanimated
        run: npm install react-native-reanimated --legacy-peer-deps
      - name: Expo Prebuild (Generate Android)
        run: npx expo prebuild --platform android --clean

      - name: Create local.properties
        run: |
          mkdir -p android
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Inject Credentials to Gradle
        run: |
          echo "NODE_BINARY=$(which node)" >> android/gradle.properties
          echo "RELEASE_STORE_FILE=my-release-key.keystore" >> android/gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/gradle.properties

      - name: Decode Keystore File
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore
        
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --stacktrace
   
      - name: Show Build Failure Details
        if: failure()
        run: |
          if [ -f android/build/reports/problems/problems-report.html ]; then
            echo "--- تفاصيل الخطأ الحقيقية ---"
            cat android/build/reports/problems/problems-report.html
          else
            echo "ملف التقرير غير موجود، جاري عرض آخر 50 سطر من الـ Gradle Logs:"
            tail -n 50 android/gradlew.log || echo "لا يوجد سجلات إضافية."
          fi
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPG-CODEX-CH-APK
          path: android/app/build/outputs/apk/release/*.apk
