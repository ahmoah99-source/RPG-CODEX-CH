name: Build APK Clean Expo Final
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 1. تثبيت الحزم الأساسية أولاً بما فيها الـ worklets قبل أي عملية بناء للأندرويد
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install react-native-worklets --legacy-peer-deps

      - name: Fix Expo Dependencies Mismatch
        run: npx expo install --fix

      # 2. تشغيل الفحص والـ Doctor قبل توليد مجلد الأندرويد للتأكد من سلامة الكود
      - name: Run Expo Doctor Scan
        run: npx expo-doctor || true

      # 3. توليد مجلد الأندرويد النظيف بناءً على الحزم المستقرة
      - name: Expo Prebuild (Generate Android)
        run: npx expo prebuild --platform android

      # 4. تطبيق الـ Patches والـ Fixes على المجلد المولد مباشرة
      - name: Overwrite Reanimated Bug File
        run: |
          if [ -f reanimated-fixed.gradle ]; then
            chmod +w android/app/build.gradle || true
            cp reanimated-fixed.gradle node_modules/react-native-reanimated/android/build.gradle || true
          fi

      - name: Inject Credentials to Gradle
        run: |
          echo "NODE_BINARY=/usr/local/bin/node" >> android/gradle.properties
          echo "RELEASE_STORE_FILE=my-release-key.keystore" >> android/gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/gradle.properties

      - name: Decode Keystore File
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore

      # 5. بناء التطبيق مع زيادة حماية الذاكرة العشوائية لمنع توقف الـ Node
      - name: Build Android APK
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --console=plain

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPG-CODEX01-APK
          path: android/app/build/outputs/apk/release/*.apk
