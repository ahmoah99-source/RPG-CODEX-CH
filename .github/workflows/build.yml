name: Build APK Clean Expo Final

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # تنظيف بيئة العمل وتثبيت المكتبات الأساسية والجديدة لـ Kotlin
      - name: Deep Clean and Install
        run: |
          rm -rf node_modules
          rm -rf .expo
          rm -rf android
          rm -f package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps
          # 1. تثبيت المكتبة الرسمية المطلوبة أوفلاين
          npm install react-native-worklets-core --legacy-peer-deps
          # 2. تثبيت الحزمة المطلوبة للتحكم بخصائص الـ Kotlin التي أضفناها لـ app.json
          npm install expo-build-properties --legacy-peer-deps
          
          # 3. ربط المسار القديم بالجديد رسمياً داخل الـ node_modules لتفادي خطأ الـ Bundler
          ln -s react-native-worklets-core node_modules/react-native-worklets

      # توليد مجلد الأندرويد تلقائياً من الإعدادات
      - name: Expo Prebuild (Generate Android)
        run: npx expo prebuild --platform android --clean

      - name: Create local.properties
        run: |
          mkdir -p android
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # حقن إعدادات الأمان والذاكرة وترقية إصدار الكوتلن في جميع ملفات ومكتبات الأندرويد مجبرة
      - name: Inject Credentials to Gradle
        run: |
          echo -e "\nNODE_BINARY=$(which node)" >> android/gradle.properties
          echo "RELEASE_STORE_FILE=my-release-key.keystore" >> android/gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          
          # 1. فرض نسخة الكوتلن داخل الـ gradle.properties الأساسي
          echo "kotlinVersion=1.9.25" >> android/gradle.properties
          echo "kotlin_version=1.9.25" >> android/gradle.properties
          
          # 2. الحل السحري الشامل: البحث عن أي ملف إعدادات (build.gradle) للمشروع أو المكتبات الفرعية واستبدال إصدار كوتلن بـ 1.9.25
          find android/ -name "build.gradle" -exec sed -i 's/kotlinVersion = "1.9.24"/kotlinVersion = "1.9.25"/g' {} \; || true
          find android/ -name "build.gradle" -exec sed -i 's/kotlin_version = "1.9.24"/kotlin_version = "1.9.25"/g' {} \; || true
          find android/ -name "build.gradle" -exec sed -i 's/ext.kotlinVersion = "1.9.24"/ext.kotlinVersion = "1.9.25"/g' {} \; || true

      - name: Decode Keystore File
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore
        
      # بدء البناء الفعلي للـ APK
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon -x lint --stacktrace
   
      # عرض الأخطاء الحقيقية لـ Gradle في حال حدوث أي مشكلة طارئة
      - name: Show Build Failure Details
        if: failure()
        run: |
          echo "--- تفاصيل الخطأ الحقيقية في حال الفشل ---"
          cd android && ./gradlew tasks --stacktrace || true
          
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RPG-CODEX-CH-APK
          path: android/app/build/outputs/apk/release/*.apk
