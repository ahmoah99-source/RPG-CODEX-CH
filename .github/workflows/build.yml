name: Build APK Clean Expo Final

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Deep Clean and Install
        run: |
          rm -rf node_modules
          rm -rf .expo
          rm -rf android
          rm -f package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      - name: Expo Prebuild (Generate Android)
        run: npx expo prebuild --platform android --clean

      - name: Create local.properties
        run: |
          mkdir -p android
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Inject Credentials to Gradle
        run: |
          echo "NODE_BINARY=$(which node)" >> android/gradle.properties
          echo "RELEASE_STORE_FILE=my-release-key.keystore" >> android/gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: Decode Keystore File
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore
        
      - name: Build Android APK
        env:
          NODE_ENV: production
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          NODE_ENV=production ./gradlew assembleRelease --no-daemon -x lint --stacktrace
   
      - name: Show Build Failure Details
        if: failure()
        run: |
          echo "--- تفاصيل الخطأ الحقيقية من داخل الأندرويد ---"
          cd android && ./gradlew tasks --stacktrace || true
          
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RPG-CODEX-CH-APK
          path: android/app/build/outputs/apk/release/*.apk
